{{ $avatar := resources.GetMatch .Site.Params.avatar }}
{{ $webp := ($avatar.Fill "180x180 webp q85") }}
{{ $tiny := ($avatar.Fill "80x80 webp q85") }}

<div class="flex-none w-20 h-20 rounded-lg overflow-hidden">
  <a href="{{ .Site.BaseURL }}">
    <img
      srcset="{{- with $tiny.RelPermalink -}}{{.}} 80w{{- end -}}"
      src="{{ $webp.RelPermalink }}"
      width="180"
      height="180"
      alt="{{ .Site.Title }}"
    />
  </a>
</div>
