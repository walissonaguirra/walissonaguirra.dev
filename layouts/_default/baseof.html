<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default `en` }}" class="scroll-smooth">
  <script>
    (function(){var t=sessionStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='dark')document.documentElement.classList.add('dark')})();
  </script>
  <head>
    {{- partial "head/index" . -}}
  </head>

  <body class="max-w-screen-md mx-auto px-2.5">
    <header class="header-main">
      <div class="header-left">
        {{ partial "header/avatar" . }}
        <div class="header-info">
          {{ partial "header/title" . }}
          {{ partial "header/nav" . }}
        </div>
      </div>
      <div class="header-actions">
        {{ partial "header/language-switcher" . }}
        {{ partial "header/theme-button" . }}
      </div>
    </header>

    <main id="content">
      {{- block "main" . -}}
      {{- end }}
    </main>

    {{- partial "footer/index" . -}}
  </body>
</html>
