<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  {{ if strings.HasSuffix .Permalink "/pt-br/" }}
  <title>Walisson Aguirra</title>
  <meta name="description" content="Walisson Aguirra — Engenheiro de software / Software engineer">
  <link rel="canonical" href="{{ .Site.BaseURL }}pt-br/">
  <link rel="alternate" hreflang="pt-BR" href="{{ .Site.BaseURL }}pt-br/">
  <link rel="alternate" hreflang="en" href="{{ .Site.BaseURL }}en/">
  <link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}pt-br/">
  <script>
    (function() {
      var lang = navigator.language || navigator.userLanguage || '';
      if (lang.toLowerCase().startsWith('pt')) {
        window.location.replace('/pt-br/');
      } else {
        window.location.replace('/en/');
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url={{ .Permalink }}">
  </noscript>
  {{ else }}
  <title>{{ .Permalink }}</title>
  <link rel="canonical" href="{{ .Permalink }}">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url={{ .Permalink }}">
  {{ end }}
</head>
<body>
  {{ if strings.HasSuffix .Permalink "/pt-br/" }}
  <a href="/pt-br/">Português</a>
  <a href="/en/">English</a>
  {{ end }}
</body>
</html>
