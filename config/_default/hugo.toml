baseURL = 'https://walissonaguirra.dev/'
copyright = "{year}"
defaultContentLanguage = 'pt-br'
defaultContentLanguageInSubdir = true
theme = 'enchanted-lowkey'
title = 'Walisson Aguirra'
enableRobotsTXT = true
enableGitInfo = true
summaryLength = 15

[minify]
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = false

[languages]
  [languages.pt-br]
    languageCode = 'pt-BR'
    languageName = 'Português'
    contentDir = 'content/pt-br'
    weight = 1
    [languages.pt-br.params]
      description = "Blog pessoal de Walisson Aguirra — engenheiro de software focado em backend, arquitetura de aplicações, Go e PHP."
  [languages.en]
    languageCode = 'en'
    languageName = 'English'
    contentDir = 'content/en'
    weight = 2
    [languages.en.params]
      description = "Personal blog of Walisson Aguirra — software engineer focused on backend, application architecture, Go and PHP."

[pagination]
  pagerSize = 5

[services]
  [services.googleAnalytics]
    ID = "G-8KWK0N3QQ6"

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    noHl = false
    style = 'github'
    tabWidth = 4
